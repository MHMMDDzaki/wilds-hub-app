server {
    listen 80;

    # SPA at /mhwilds-companion/
    location /mhwilds-companion/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /mhwilds-companion/index.html;
    }

    location = /mhwilds-companion {
        return 301 /mhwilds-companion/;
    }

    # Proxy API — block direct browser navigation, allow JS fetch
    location /api/ {
        if ($http_sec_fetch_mode = "navigate") {
            return 403;
        }
        proxy_pass         http://api:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /health {
        if ($http_sec_fetch_mode = "navigate") {
            return 403;
        }
        proxy_pass http://api:3000;
    }

    # Block everything else
    location / {
        return 404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
