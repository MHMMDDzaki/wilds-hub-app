name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build Docker image & push to GHCR ────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.image.outputs.name }}
          # To override VITE_* at build time, add GitHub Actions secrets and
          # pass them here as build-args, e.g.:
          # build-args: |
          #   VITE_API_BASE=${{ secrets.VITE_API_BASE }}

  # ── Pull & restart container on VPS (main only) ───────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            IMAGE=${{ needs.build.outputs.image }}
            docker pull $IMAGE
            docker stop wilds-hub 2>/dev/null || true
            docker rm   wilds-hub 2>/dev/null || true
            docker run -d \
              --name wilds-hub \
              --restart unless-stopped \
              -p 80:80 \
              $IMAGE
